<style>
:root{
  --bg:#f5f4ee;--surface:#fff;--s2:#eeede6;--border:#dddbd1;
  --text:#0f0f0f;--text2:#3a3a3a;--muted:#888878;
  --or:#e85d00;--or-bg:#fff1e6;
  --gr:#0d7a3e;--gr-bg:#e6f7ee;
  --rd:#c8200a;--rd-bg:#fde8e5;
  --bl:#1a5cd8;--bl-bg:#e8eeff;
  --yl:#c89500;--yl-bg:#fff8de;
  --dark:#0a0a0a;--dark3:#1e1e1e;
  --fh:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
  --sb-w:240px;--radius:14px;--acent:var(--or);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}

/* ── PWA FIX: no scroll/zoom on load ── */
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  touch-action: pan-y;
}
body{background:var(--bg);color:var(--text);font-family:var(--fm);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--s2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
/* LOGIN */
.login-screen{display:flex;min-height:100dvh;align-items:center;justify-content:center;padding:20px;background:var(--dark);position:relative;overflow:hidden;}
.login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(232,93,0,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 90%,rgba(232,93,0,.10) 0%,transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(255,255,255,.03) 47px,rgba(255,255,255,.03) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(255,255,255,.03) 47px,rgba(255,255,255,.03) 48px);pointer-events:none;}
.login-screen::after{content:'🛡️';position:absolute;font-size:280px;opacity:.04;bottom:-30px;right:-20px;pointer-events:none;}
.lbox{background:rgba(255,255,255,.97);border-radius:20px;padding:38px 34px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,.5);animation:lIn .45s cubic-bezier(.22,1,.36,1);}
@keyframes lIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.l-brand{text-align:center;margin-bottom:26px;}
.l-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px;}
.l-icon{width:46px;height:46px;background:var(--or);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(232,93,0,.3);}
.l-name{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-1px;}
.l-name span{color:var(--or);}
.l-role{display:inline-flex;align-items:center;gap:6px;background:rgba(232,93,0,.1);color:var(--or);font-family:var(--fh);font-weight:700;font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid rgba(232,93,0,.2);}
.l-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;font-family:var(--fh);}
.ff{margin-bottom:14px;}
.ff label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;font-family:var(--fh);font-weight:600;}
.ff input{width:100%;background:var(--s2);border:2px solid var(--border);color:var(--text);padding:11px 14px;font-family:var(--fm);font-size:13px;border-radius:10px;outline:none;transition:border-color .15s;}
.ff input:focus{border-color:var(--or);background:#fff;}
.btn-login{width:100%;padding:14px;background:var(--or);color:#fff;border:none;border-radius:11px;font-family:var(--fh);font-size:14px;font-weight:800;transition:all .15s;box-shadow:0 6px 20px rgba(232,93,0,.25);}
.btn-login:hover{background:#cf5200;transform:translateY(-1px);}
.l-hint{text-align:center;margin-top:13px;font-size:11px;color:var(--muted);}
.l-hint strong{color:var(--or);}
.l-links{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.l-link{font-size:10px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);text-decoration:none;font-family:var(--fh);font-weight:600;transition:all .12s;}
.l-link:hover{border-color:var(--or);color:var(--or);}
/* APP */
.app{display:none;min-height:100dvh;flex-direction:row;}
.app.on{display:flex;}
.sb{width:var(--sb-w);background:var(--dark);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:300;transform:translateX(-100%);transition:transform .28s cubic-bezier(.22,1,.36,1);}
.sb.open{transform:translateX(0);}
@media(min-width:900px){.sb{transform:translateX(0);}.sb-close,.tb-menu{display:none!important;}.wrap{margin-left:var(--sb-w)!important;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;backdrop-filter:blur(2px);}
.overlay.on{display:block;}
.wrap{margin-left:0;flex:1;display:flex;flex-direction:column;min-height:100dvh;width:100%;}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--dark3);display:flex;align-items:center;justify-content:space-between;}
.sb-brand{display:flex;align-items:center;gap:10px;}
.sb-icon{width:34px;height:34px;background:var(--or);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-name{font-family:var(--fh);font-size:14px;font-weight:800;color:#fff;}
.sb-ver{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1.5px;}
.sb-close{background:none;border:1px solid #2a2a2a;color:#555;width:26px;height:26px;border-radius:6px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.sb-close:hover{border-color:#555;color:#fff;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-sec{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#333;padding:12px 16px 5px;font-family:var(--fh);font-weight:700;}
.sb-i{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:11px;color:#666;transition:all .12s;text-transform:uppercase;letter-spacing:.7px;border-left:3px solid transparent;font-family:var(--fh);font-weight:600;border-radius:0 8px 8px 0;margin-right:8px;}
.sb-i:hover{color:#ccc;background:rgba(255,255,255,.05);}
.sb-i.on{color:#fff;background:rgba(232,93,0,.12);border-left-color:var(--or);}
.sb-ic{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.sb-bdg{margin-left:auto;background:var(--or);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;}
.sb-ft{padding:13px 16px;border-top:1px solid var(--dark3);}
.u-row{display:flex;align-items:center;gap:9px;}
.u-av{width:32px;height:32px;background:rgba(232,93,0,.15);border:2px solid var(--or);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.u-nm{font-family:var(--fh);font-size:11px;font-weight:700;color:#ddd;}
.u-rl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;}
.btn-out{background:none;border:1px solid #2a2a2a;color:#444;padding:4px 8px;border-radius:6px;font-size:9px;margin-left:auto;transition:all .12s;font-family:var(--fh);font-weight:600;flex-shrink:0;}
.btn-out:hover{border-color:var(--rd);color:var(--rd);}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 18px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.04);}
.tb-l{display:flex;align-items:center;gap:11px;}
.tb-menu{background:var(--s2);border:1.5px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text);transition:all .12s;}
.tb-menu:hover{background:var(--border);}
.tb-ttl{font-family:var(--fh);font-size:16px;font-weight:800;letter-spacing:-.4px;}
.tb-r{display:flex;align-items:center;gap:8px;}
.pgc{padding:18px;flex:1;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
/* Components */
.krow{display:grid;gap:12px;margin-bottom:18px;}
.k4{grid-template-columns:repeat(4,1fr);}
.k3{grid-template-columns:repeat(3,1fr);}
.k2{grid-template-columns:repeat(2,1fr);}
.kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:all .15s;}
.kpi:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);transform:translateY(-1px);}
.kb{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.ki{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px;font-family:var(--fh);font-weight:600;}
.kv{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1;}
.ks{font-size:10px;color:var(--muted);margin-top:3px;}
.cor .kb{background:var(--or);}.cor .ki{background:var(--or-bg);}
.cgr .kb{background:var(--gr);}.cgr .ki{background:var(--gr-bg);}
.cbl .kb{background:var(--bl);}.cbl .ki{background:var(--bl-bg);}
.crd .kb{background:var(--rd);}.crd .ki{background:var(--rd-bg);}
.cyl .kb{background:var(--yl);}.cyl .ki{background:var(--yl-bg);}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.ch{padding:12px 16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s2);gap:8px;flex-wrap:wrap;}
.ct{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.cb{padding:16px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 12px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);background:var(--s2);border-bottom:1.5px solid var(--border);font-family:var(--fh);white-space:nowrap;}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--s2);}
.bo{font-weight:600;font-family:var(--fh);color:var(--text);}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--fh);white-space:nowrap;}
.cgr2{background:var(--gr-bg);color:var(--gr);}
.cor2{background:var(--or-bg);color:var(--or);}
.crd2{background:var(--rd-bg);color:var(--rd);}
.cbl2{background:var(--bl-bg);color:var(--bl);}
.cyl2{background:var(--yl-bg);color:var(--yl);}
.cmu{background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--fh);}
.p-or{background:var(--or-bg);color:var(--or);}
.p-gr{background:var(--gr-bg);color:var(--gr);}
.p-rd{background:var(--rd-bg);color:var(--rd);}
.p-bl{background:var(--bl-bg);color:var(--bl);}
.p-mu{background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.btn{padding:9px 16px;font-family:var(--fh);font-size:11px;font-weight:700;border:none;border-radius:9px;transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.bor{background:var(--or);color:#fff;}.bor:hover{background:#cf5200;}
.bou{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);}.bou:hover{border-color:var(--text);}
.brd{background:var(--rd);color:#fff;}
.bsm{padding:5px 11px;font-size:10px;}
.bfu{width:100%;justify-content:center;}
.ptrack{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:5px;border:1px solid var(--border);}
.pbar{height:100%;border-radius:3px;transition:width .5s;}
.plbl{font-size:10px;color:var(--muted);}
.alert-box{background:var(--rd-bg);border:1.5px solid var(--rd);border-radius:11px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;animation:shk .3s;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.al-ic{font-size:20px;flex-shrink:0;}
.al-ttl{font-family:var(--fh);font-weight:700;color:var(--rd);font-size:12px;margin-bottom:2px;}
.al-body{font-size:10px;color:var(--rd);opacity:.85;}
.lr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.lr:last-child{border-bottom:none;}
.ll{font-size:11px;color:var(--text2);}
.lv{font-family:var(--fh);font-weight:700;font-size:12px;}
.mapbox{background:linear-gradient(145deg,#cde4cf,#b8d4ba);border-radius:11px;height:240px;position:relative;overflow:hidden;border:1.5px solid var(--border);}
.map-car{position:absolute;font-size:18px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:all .6s;}
.map-pin{position:absolute;font-size:16px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
.map-roads{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,.2) 30px,rgba(255,255,255,.2) 32px);}
.map-leg{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-radius:8px;padding:8px 12px;font-size:10px;line-height:1.7;}
.stbl{background:#0d0d0d;border-radius:11px;padding:16px;margin-bottom:12px;border:1px solid var(--dark3);}
.sn{font-family:var(--fh);font-size:12px;font-weight:800;color:var(--or);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sf{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #181818;font-size:10px;}
.sf:last-child{border-bottom:none;}
.sf-n{color:#ddd;font-family:var(--fm);width:130px;flex-shrink:0;}
.sf-t{color:var(--or);font-family:var(--fm);width:100px;flex-shrink:0;}
.sf-d{color:#444;flex:1;}
.spk{color:var(--yl);font-size:8px;font-weight:700;background:#1a1200;padding:1px 4px;border-radius:3px;margin-right:3px;}
.sfk{color:var(--bl);font-size:8px;font-weight:700;background:#00101a;padding:1px 4px;border-radius:3px;margin-right:3px;}
.as{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
.an{width:26px;height:26px;background:var(--or);color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:11px;flex-shrink:0;margin-top:2px;}
.at{font-family:var(--fh);font-weight:700;font-size:12px;margin-bottom:3px;}
.ad{font-size:11px;color:var(--text2);line-height:1.6;}
.cl{background:var(--s2);border-radius:6px;padding:4px 8px;font-family:var(--fm);font-size:10px;color:var(--or);margin-top:5px;border-left:3px solid var(--or);overflow-x:auto;white-space:nowrap;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--dark);color:#fff;border-left:4px solid var(--gr);padding:12px 16px;font-size:11px;border-radius:10px;z-index:9999;transform:translateX(140%);transition:transform .3s cubic-bezier(.22,1,.36,1);font-family:var(--fh);font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);max-width:300px;}
.toast.on{transform:translateX(0);}
.toast.err{border-left-color:var(--rd);}
.toast.wrn{border-left-color:var(--yl);}
@media(max-width:899px){.k4{grid-template-columns:repeat(2,1fr);}.k3{grid-template-columns:repeat(2,1fr);}.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}.kv{font-size:20px;}.pgc{padding:13px;}.topbar{padding:0 13px;}.tb-ttl{font-size:15px;}}
@media(max-width:480px){.k4,.k3,.k2{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr;}.toast{right:10px;bottom:10px;max-width:calc(100vw - 20px);}}
</style>
<script>
(function(){
  var m = {
    name: "Neo Pisk Admin",
    short_name: "NeoPisk Admin",
    start_url: "./",
    display: "standalone",

  const nav=document.getElementById('snav'); nav.innerHTML='';

function vSchema(){
  const tbls=[
    {nm:'Usuarios',ic:'👤',f:[['id','UUID','PK · Auto'],['nombre','VARCHAR(100)','Nombre'],['email','VARCHAR(150)','Único'],['password_hash','VARCHAR(255)','bcrypt'],['rol','ENUM','admin|conductor|cliente|inversor'],['activo','BOOLEAN','false hasta aprobación']]},
    {nm:'Vehiculos',ic:'🚗',f:[['id','UUID','PK'],['conductor_id','UUID','FK → Usuarios'],['placa','VARCHAR(8)','Único'],['soat_venc','DATE','Alerta 30 días'],['atu_venc','DATE','Alerta 30 días'],['sinotrack_id','VARCHAR(50)','ID GPS físico']]},
    {nm:'Rutas',ic:'🛣️',f:[['id','UUID','PK'],['origen','VARCHAR(100)','Búnker SJL'],['destino','VARCHAR(100)','San Borja/Surco'],['pago_conductor','DECIMAL','S/ 50 por ruta'],['ganancia_np','DECIMAL','S/ 150 auto'],['estado','ENUM','pendiente|activa|completada']]},
    {nm:'Transacciones',ic:'💰',f:[['id','UUID','PK'],['ruta_id','UUID','FK → Rutas'],['conductor_id','UUID','FK → Usuarios'],['monto_conductor','DECIMAL','S/ 50'],['monto_neopisk','DECIMAL','S/ 150'],['estado','ENUM','pendiente|acreditado']]},
  ];
  return`<div class="g2">${tbls.map(t=>`<div class="stbl"><div class="sn">${t.ic} ${t.nm}</div>${t.f.map((f,i)=>`<div class="sf"><span class="sf-n">${i===0?'<span class="spk">PK</span>':f[0].includes('_id')?'<span class="sfk">FK</span>':''}${f[0]}</span><span class="sf-t">${f[1]}</span><span class="sf-d">${f[2]}</span></div>`).join('')}</div>`).join('')}</div>`;}

function vAlgo(){
  const steps=[
    ['Acumulación 10×50','Búnker monitorea pedidos. Cuando zona llega a 10 y S/ 500 mínimo, dispara activación.','IF pedidos >= 10 AND monto >= 500 → activar_ruta()'],
    ['Filtro Elegibilidad','Solo conductores: activo=true, docs vigentes, sin ruta activa.','SELECT * FROM conductores WHERE docs_ok AND NOT en_ruta'],
    ['Score de Prioridad','Score: +20 cercanía GPS, +15 historial OK, -30 alertas velocidad.','score = dist + historial - penalizaciones'],
    ['Match & Notificación','Mayor score recibe push+WhatsApp. Tiene 3 min para aceptar.','notify(top_score) → timeout 3min → retry'],
    ['Anti-fraude GPS','GPS del vehículo debe activarse en radio 500m del búnker en 15 min.','IF gps NOT IN radius(500m) → cancelar()'],
  ];
  return`
<div class="g2">
  <div>
    <div class="card">
      <div class="ch"><div class="ct">⚙️ Algoritmo de Asignación de Rutas</div></div>
      <div class="cb">
        ${steps.map((s,i)=>`<div class="as"><div class="an">${i+1}</div><div><div class="at">${s[0]}</div><div class="ad">${s[1]}</div><div class="cl">${s[2]}</div></div></div>`).join('')}
      </div>
    </div>
  </div>
  <div>
    <div class="card">
      <div class="ch"><div class="ct">🧮 Simulador de Match</div></div>
      <div class="cb">
        <div style="font-size:11px;color:var(--text2);margin-bottom:12px;padding:9px;background:var(--s2);border-radius:8px">Ruta activa: <strong>SJL → San Borja · S/ 50</strong></div>
        ${[{nm:'Carlos Huanca',sc:92,d:'0.8km',r:12,a:0},{nm:'Pedro Quispe',sc:78,d:'2.1km',r:8,a:0},{nm:'Ana Flores',sc:65,d:'3.5km',r:5,a:1}].map((c,i)=>`
        <div style="padding:12px;background:${i===0?'var(--gr-bg)':'var(--s2)'};border-radius:10px;border:2px solid ${i===0?'var(--gr)':'var(--border)'};margin-bottom:8px">

          <div style="font-size:10px;color:var(--muted)">📍 ${c.d} · ${c.r} rutas OK · ${c.a} alertas</div>
          ${i===0?`<div style="margin-top:6px;font-size:10px;color:var(--gr);font-weight:700">✓ ASIGNADO — 3 min para aceptar</div>`:''}
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ch"><div class="ct">🏗️ Stack Técnico</div></div>
      <div class="cb">
        ${[['Backend','Node.js + Express'],['DB','PostgreSQL'],['Auth','JWT RS256'],['GPS','SinoTrack API'],['Push','FCM Firebase'],['Pagos','Yape / BCP']].map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div style="font-size:10px;color:var(--muted);font-family:var(--fh)">${r[0]}</div><div style="font-family:var(--fh);font-weight:700;font-size:11px">${r[1]}</div></div>`).join('')}
      </div>
    </div>
  </div>
</div>`;}
