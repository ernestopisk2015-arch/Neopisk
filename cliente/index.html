<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GruPay">
<title>GruPay — Compra en grupo, ahorra en grand
<link rel="manifest" href="/cliente/manifest.json">
<link rel="apple-touch-icon" href="" id="apple-icon">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var c=document.createElement('canvas');c.width=192;c.height=192;
  var x=c.getContext('2d'),r=42;
  x.beginPath();x.moveTo(r,0);x.lineTo(192-r,0);x.quadraticCurveTo(192,0,192,r);
  x.lineTo(192,192-r);x.quadraticCurveTo(192,192,192-r,192);
  x.lineTo(r,192);x.quadraticCurveTo(0,192,0,192-r);
  x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);x.closePath();
  x.fillStyle='#16a34a';x.fill();
  x.font='106px serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText('🛒',96,102);
  document.getElementById('apple-icon').href=c.toDataURL('image/png');
})();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/cliente/sw.js',{scope:'/cliente/'}).catch(function(e){console.warn('SW:',e);});
  });
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#16a34a;--gd:#14532d;--gl:#f0fdf4;--gb:#bbf7d0;
  --a:#f59e0b;--r:#dc2626;--txt:#0f172a;--mut:#64748b;--bdr:#e2e8f0;--bg:#f8fafc;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden;overscroll-behavior:none;}
#shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg);}

.hdr{background:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--bdr);flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:8px;}
.logo-ic{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#14532d,#16a34a);display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-t{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;letter-spacing:-1px;line-height:1;}
.logo-t b{color:var(--g);}
.logo-s{font-size:9px;color:var(--mut);letter-spacing:.5px;font-weight:600;}
.hdr-btns{display:flex;gap:6px;}
.btn-login{padding:6px 12px;border-radius:99px;border:2px solid var(--bdr);background:#fff;font-size:11px;font-weight:700;cursor:pointer;color:var(--txt);white-space:nowrap;}
.btn-register{padding:6px 12px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--gd),var(--g));font-size:11px;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap;}

.screen{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.screen.active{display:flex;}
#screen-inicio.active{display:block;}

.hero{background:linear-gradient(135deg,#14532d 0%,#166534 50%,#15803d 100%);padding:12px 16px 14px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero-tag{background:rgba(255,255,255,.15);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:99px;display:inline-block;margin-bottom:6px;border:1px solid rgba(255,255,255,.2);}
.hero-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;}
.hero-title span{color:#86efac;}
.hero-sub{color:rgba(255,255,255,.8);font-size:12px;line-height:1.4;margin-bottom:10px;}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;border-radius:99px;}
.hero-cta{display:flex;gap:8px;}
.btn-hero-register{flex:1;padding:10px;background:#fff;color:var(--gd);border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-hero-login{flex:1;padding:10px;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}

.scroll-body{padding:14px;display:flex;flex-direction:column;gap:14px;}

.how-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--bdr);}
.how-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:900;margin-bottom:12px;}
.how-steps{display:flex;}
.how-step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;}
.how-step:not(:last-child)::after{content:'→';position:absolute;right:-6px;top:12px;color:var(--mut);font-size:14px;font-weight:700;}
.step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-bottom:5px;}
.step-txt{font-size:10px;font-weight:600;color:var(--txt);line-height:1.3;}

.cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;background:#fff;border:2px solid var(--bdr);border-radius:12px;cursor:pointer;transition:all .2s;min-width:72px;}
.cat-btn.on{background:var(--gl);border-color:var(--g);}
.cat-btn span:first-child{font-size:22px;}
.cat-btn span:last-child{font-size:10px;font-weight:700;color:var(--mut);white-space:nowrap;}
.cat-btn.on span:last-child{color:var(--gd);}

.sec-row{display:flex;align-items:center;justify-content:space-between;}
.sec-t{font-family:'Syne',sans-serif;font-size:16px;font-weight:900;}
.sec-count{background:var(--gl);color:var(--gd);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid var(--gb);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border:2px solid transparent;transition:border .2s,transform .1s;cursor:pointer;position:relative;}
.pc:active{transform:scale(.97);}
.pc-img{width:100%;height:90px;object-fit:cover;background:#f1f5f9;}
.pc-img-em{width:100%;height:90px;background:linear-gradient(135deg,var(--gl),#dcfce7);display:flex;align-items:center;justify-content:center;font-size:42px;}
.ribbon-desc{position:absolute;top:6px;right:6px;background:#dc2626;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:99px;}
.pc-bd{padding:8px 8px 10px;}
.pc-nm{font-weight:700;font-size:12px;line-height:1.3;margin-bottom:4px;}
.price-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.price-normal{font-size:11px;color:var(--mut);text-decoration:line-through;}
.pr-s{font-size:10px;font-weight:700;color:var(--g);}
.pr-n{font-size:16px;font-weight:900;color:var(--g);font-family:'Syne',sans-serif;}
.pr-u{font-size:9px;color:var(--mut);margin-left:1px;}
.desc-badge{background:#dcfce7;color:var(--gd);font-size:9px;font-weight:800;padding:2px 5px;border-radius:99px;}
.pc-sub{font-size:9px;color:var(--mut);}

.checkout-hdr{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--bdr);flex-shrink:0;}
.checkout-back{background:none;border:none;font-size:20px;cursor:pointer;}
.checkout-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:900;}
.sector-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--g);cursor:pointer;transition:transform .1s;}
.sector-card:active{transform:scale(.98);}
.sector-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:900;margin-bottom:4px;}
.sector-meta{font-size:11px;color:var(--mut);display:flex;gap:10px;}
.sector-prog{height:4px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:6px;}
.sector-prog-f{height:100%;background:linear-gradient(90deg,var(--g),#22c55e);border-radius:99px;transition:width .5s;}
.sector-desc-tag{background:#dcfce7;color:var(--gd);font-size:9px;font-weight:800;padding:2px 6px;border-radius:99px;margin-left:6px;}

.form-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.form-label{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:5px;display:block;letter-spacing:.3px;}
.form-input{width:100%;padding:11px 13px;border:2px solid var(--bdr);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;background:#fff;}
.form-input:focus{border-color:var(--g);}
.upload-box{border:2px dashed var(--bdr);border-radius:10px;padding:20px;text-align:center;cursor:pointer;}
.upload-box input{display:none;}
.upload-preview{max-width:100%;border-radius:8px;margin-top:10px;display:none;}
.resumen-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.resumen-item:last-child{border-bottom:none;font-weight:700;font-size:15px;}
.desc-box{background:#f0fdf4;border:1.5px solid var(--gb);border-radius:10px;padding:10px;text-align:center;}
.desc-box-t{font-family:'Syne',sans-serif;font-size:13px;font-weight:900;color:var(--gd);}
.desc-box-s{font-size:11px;color:var(--mut);margin-top:2px;}
.share-btn{width:100%;padding:13px;background:#25d366;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-confirmar{width:100%;padding:14px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}
.btn-confirmar:disabled{background:#9ca3af;}

.hist-card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;}
.hist-em{font-size:30px;flex-shrink:0;}
.hist-info{flex:1;}
.hist-nm{font-weight:700;font-size:13px;}
.hist-meta{font-size:11px;color:var(--mut);margin-top:2px;}
.hist-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;}
.hs-pending{background:#fef9c3;color:#854d0e;}
.hs-active{background:#dcfce7;color:#15803d;}

.contact-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .1s;}
.contact-card:active{transform:scale(.98);}
.contact-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.contact-ic.wa{background:#dcfce7;}
.contact-ic.karla{background:linear-gradient(135deg,#14532d,#16a34a);}
.contact-info-t{font-weight:700;font-size:14px;margin-bottom:2px;}
.contact-info-s{font-size:12px;color:var(--mut);}
.contact-arrow{color:var(--mut);font-size:18px;flex-shrink:0;}

.nav{background:#fff;border-top:2px solid var(--bdr);display:flex;flex-shrink:0;box-shadow:0 -2px 8px rgba(0,0,0,.04);}
.nav-btn{flex:1;padding:9px 4px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--mut);font-family:'DM Sans',sans-serif;font-weight:600;transition:color .2s;}
.nav-btn.active{color:var(--g);}
.nav-btn span:first-child{font-size:20px;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f172a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.cart-btn{position:relative;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.cart-item{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 1px 6px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;border:1.5px solid var(--bdr);}
.cart-item-em{font-size:28px;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-nm{font-weight:700;font-size:13px;}
.cart-item-pr{font-size:12px;color:var(--g);font-weight:700;}
.cart-item-del{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;}
.cart-total-box{background:linear-gradient(135deg,#14532d,#166534);border-radius:14px;padding:14px;color:#fff;}
.cart-total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;opacity:.85;}
.cart-total-final{display:flex;justify-content:space-between;font-family:'Syne',sans-serif;font-size:18px;font-weight:900;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;margin-top:2px;}

.empty{text-align:center;color:var(--mut);padding:40px 20px;}
.empty span{font-size:48px;display:block;margin-bottom:10px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--mut);padding:40px;}
.spinner{width:32px;height:32px;border:3px solid var(--gb);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Botones de producto */
.pc-btns{display:flex;gap:6px;padding:0 8px 8px;}
.btn-grupo{flex:1;padding:7px 4px;border:2px solid var(--gb);border-radius:8px;background:var(--gl);color:var(--gd);font-size:10px;font-weight:700;cursor:pointer;}
.btn-carrito{flex:1;padding:7px 4px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--gd),var(--g));}
.btn-carrito.en-carrito{background:#bbf7d0;color:var(--gd);}
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">
      <div class="logo-ic">🛒</div>
      <div>
        <div class="logo-t">Gru<b>Pay</b></div>
        <div class="logo-s">COMPRA EN GRUPO · AHORRA</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="cart-btn" onclick="goScreen('carrito')" id="hdr-cart">
        🛒 Carrito
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
      <div class="hdr-btns" id="hdr-btns">
        <button class="btn-login" onclick="goScreen('login')">Ingresar</button>
      </div>
      <div id="hdr-user" style="display:none;align-items:center;gap:8px;">
        <div style="background:var(--gl);border:1.5px solid var(--gb);color:var(--gd);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;" id="hdr-nombre"></div>
        <button onclick="cerrarSesion()" style="background:none;border:none;font-size:11px;color:var(--mut);cursor:pointer;">Salir</button>
      </div>
    </div>
  </div>

  <!-- SCREEN INICIO -->
  <div class="screen active" id="screen-inicio">
    <div class="hero">
      <div class="hero-tag">🇵🇪 MERCADO PERUANO · LA PARADA</div>
      <div class="hero-title">Compra solo o <span>junta tu grupo</span> 💸</div>
      <div class="hero-pills">
        <div class="pill">🛒 Compra individual disponible</div>
        <div class="pill">👥 5 personas = 10% OFF</div>
        <div class="pill">🚚 Entrega en tu sector</div>
      </div>
      <div class="hero-cta" id="hero-cta-guest">
        <button class="btn-hero-register" onclick="goScreen('login');switchTab('registro')">🤖 Crear mi cuenta</button>
        <button class="btn-hero-login" onclick="goScreen('login')">🔑 Iniciar sesión</button>
      </div>
      <div id="hero-cta-user" style="display:none;background:rgba(255,255,255,.15);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.2);">
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:900;color:#fff;margin-bottom:4px;">👋 Hola, <span id="hero-nombre"></span>!</div>
        <div style="font-size:12px;color:rgba(255,255,255,.8);margin-bottom:12px;">¿Qué quieres hacer hoy?</div>
        <div style="display:flex;gap:8px;">
          <button onclick="scrollToProductos()" style="flex:1;padding:10px 8px;background:#fff;color:#14532d;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;">
            🛒 Ver productos
          </button>
          <button onclick="goScreen('carrito')" style="flex:1;padding:10px 8px;background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;">
            🛒 Mi carrito <span id="hero-cart-count" style="background:#dc2626;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;"></span>
          </button>
        </div>
      </div>
    </div>
    <div class="scroll-body">
      <div class="how-card">
        <div class="how-title">¿Cómo funciona? 🤔</div>
        <div class="how-steps">
          <div class="how-step"><div class="step-num">1</div><div class="step-txt">Elige producto</div></div>
          <div class="how-step"><div class="step-num">2</div><div class="step-txt">Compra solo o en grupo</div></div>
          <div class="how-step"><div class="step-num">3</div><div class="step-txt">5 vecinos = 10% OFF</div></div>
          <div class="how-step"><div class="step-num">4</div><div class="step-txt">¡Recibe tu pedido!</div></div>
        </div>
      </div>
      <div>
        <div class="sec-row" style="margin-bottom:10px;">
          <div class="sec-t">🗂 Categorías</div>
          <div class="sec-count" id="hs-g">cargando...</div>
        </div>
        <div class="cat-row">
          <div class="cat-btn on" onclick="selCat('todas',this)"><span>🛒</span><span>Todos</span></div>
          <div class="cat-btn" onclick="selCat('frutas',this)"><span>🍓</span><span>Frutas y Verduras</span></div>
          <div class="cat-btn" onclick="selCat('lacteos',this)"><span>🧀</span><span>Lácteos</span></div>
          <div class="cat-btn" onclick="selCat('postres',this)"><span>🍬</span><span>Postres</span></div>
        </div>
      </div>
      <div id="inicio-body">
        <div class="loading"><div class="spinner"></div><span>Cargando productos...</span></div>
      </div>
    </div>
  </div>

  <!-- SCREEN CATEGORIAS -->
  <div class="screen" id="screen-categorias">
    <div class="scroll-body">
      <div class="sec-t" style="padding:4px 0;">🗂 Todas las categorías</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="contact-card" onclick="goScreen('inicio');selCatById('frutas')">
          <div class="contact-ic" style="background:#fef9c3;font-size:28px;">🍓</div>
          <div class="contact-info"><div class="contact-info-t">Frutas y Verduras</div><div class="contact-info-s">Arándanos, kiwi glaseado y más</div></div>
          <div class="contact-arrow">›</div>
        </div>
        <div class="contact-card" onclick="goScreen('inicio');selCatById('lacteos')">
          <div class="contact-ic" style="background:#f0fdf4;font-size:28px;">🧀</div>
          <div class="contact-info"><div class="contact-info-t">Lácteos</div><div class="contact-info-s">Quesos frescos de Cajamarca</div></div>
          <div class="contact-arrow">›</div>
        </div>
        <div class="contact-card" onclick="goScreen('inicio');selCatById('postres')">
          <div class="contact-ic" style="background:#fff7ed;font-size:28px;">🍬</div>
          <div class="contact-info"><div class="contact-info-t">Postres y Snacks</div><div class="contact-info-s">Pecanas, pasas, dátiles, maní y más</div></div>
          <div class="contact-arrow">›</div>
        </div>
      </div>
    </div>
  </div>

async function geocodificarDireccion(direccion){
  try{
    const q=encodeURIComponent(direccion+", Lima, Perú");
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,{headers:{"Accept-Language":"es","User-Agent":"GruPay/1.0"}});
    const data=await r.json();
    if(data&&data[0]) return {lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
  }catch(e){}
  return null;
}
function calcularDistanciaMetros(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  try{
    const tel9=tel.replace(/\D/g,'').slice(-9);
    const ref=doc(db,'grupay_users',tel9);
    const snap=await getDoc(ref);
    if(snap.exists()){
      const data=snap.data();
      localStorage.setItem('gp_user',JSON.stringify({id:tel9,...data}));
      mostrarUsuario({id:tel9,...data});
      toast("✅ Ya tienes cuenta! Bienvenido "+data.nombre.split(' ')[0]+"!");
      goScreen('inicio'); return;
    }
    const userData={nombre,telefono:tel9,telefono_completo:'51'+tel9,direccion,referencia,horario,fecha_registro:serverTimestamp(),activo:true};
    await setDoc(ref,userData);
    localStorage.setItem('gp_user',JSON.stringify({id:tel9,...userData}));
    mostrarUsuario({id:tel9,...userData});
    toast("🎉 Cuenta creada! Bienvenido "+nombre.split(' ')[0]+"!");
    goScreen('inicio');
  }catch(e){ msg.textContent="❌ Error: "+e.message; msg.style.color="var(--r)"; btn.disabled=false; btn.textContent="Crear cuenta →"; }
};

window.cerrarSesion=function(){
  usuarioActual=null; localStorage.removeItem("gp_user");
  document.getElementById("hdr-btns").style.display="flex";
  document.getElementById("hdr-user").style.display="none";
  document.getElementById("hero-cta-guest").style.display="flex";
  document.getElementById("hero-cta-user").style.display="none";
  actualizarBadgeCarrito(); toast("👋 Sesión cerrada"); goScreen("inicio");
};

window.abrirKarla=function(tipo){
  const msgs={soporte:"Hola Karla, necesito soporte con mi pedido GruPay.",registro:"Hola Karla, quiero registrarme en GruPay."};
  window.open(`https://wa.me/51948115030?text=${encodeURIComponent(msgs[tipo]||msgs.soporte)}`,"_blank");
};
window.abrirWA=function(){ window.open(`https://wa.me/51948115030`,"_blank"); };

// ── CATEGORIAS ────────────────────────────────────────────────────────────
window.selCat=function(cat,btn){
  catActual=cat;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on"); renderInicio();
};
window.selCatById=function(cat){
  catActual=cat;
  document.querySelectorAll(".cat-btn").forEach(b=>{
    if(b.getAttribute("onclick")&&b.getAttribute("onclick").includes(cat)) b.classList.add("on");
    else b.classList.remove("on");
  });
  renderInicio();
};

window.toggleFaq=function(el){
  const body=el.querySelector("div:last-child");
  const ico=el.querySelector("span:last-child");
  const open=body.style.display==="block";
  body.style.display=open?"none":"block";
  ico.textContent=open?"+":"−";
};

// ── FIRESTORE ─────────────────────────────────────────────────────────────
const el_loading = document.getElementById("inicio-body");
el_loading.innerHTML = `<div style="padding:20px;color:red;font-size:14px;">⚡ JS llegó hasta aquí</div>`;

const unsubscribe = onSnapshot(
  collection(db,"grupay_groups"),
  (snap) => {
    snap.docChanges().forEach(ch => {
      if(ch.type==="removed") delete grupos[ch.doc.id];
      else grupos[ch.doc.id]={id:ch.doc.id,...ch.doc.data()};
    });
    const n=Object.values(grupos).length;
    const hs = document.getElementById("hs-g");
    if(hs) hs.textContent=n+" producto"+(n!==1?"s":"");
    renderInicio();
  },
  (error) => {
    console.error("Firestore error:", error);
    const el=document.getElementById("inicio-body");
    if(el) el.innerHTML=`
      <div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:14px;padding:20px;text-align:center;margin:10px 0;">
        <div style="font-size:36px;margin-bottom:8px;">⚠️</div>
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:900;color:#dc2626;margin-bottom:6px;">Error de conexión</div>
        <div style="font-size:12px;color:#991b1b;margin-bottom:14px;">${error.code||error.message}</div>
        <button onclick="location.reload()" style="background:#dc2626;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>
      </div>`;
    toast("❌ Error Firebase: " + (error.code||error.message));
  }
);

function renderInicio(){
  let lista=Object.values(grupos);
  // Ordenar por nombre alfabéticamente (evita depender de created_at en Firestore)
  lista.sort((a,b)=>(a.product_name||'').localeCompare(b.product_name||'','es'));
  if(catActual!=="todas") lista=lista.filter(g=>CATS[g.id]===catActual);
  const el=document.getElementById("inicio-body");
  if(!lista.length){ el.innerHTML=`<div class="empty"><span>📭</span>No hay productos en esta categoría</div>`; return; }
  el.innerHTML=`<div class="grid">${lista.map(cardHTML).join("")}</div>`;
}

function cardHTML(g){
  const tieneDesc=g.has_discount!==false;
  const pN=g.price_per_unit||0;
  const pG=tieneDesc?Math.round(pN*0.9*10)/10:pN;
  const imgSrc=g.image_url||null;
  const imgEl=imgSrc
    ?`<img class="pc-img" src="${imgSrc}" alt="${g.product_name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="pc-img-em" style="display:none">${g.emoji||"📦"}</div>`
    :`<div class="pc-img-em">${g.emoji||"📦"}</div>`;
  const yaEnCarrito=carrito.find(i=>i.id===g.id);

  return `<div class="pc">
    ${tieneDesc?`<div class="ribbon-desc">10% c/grupo</div>`:""}
    ${imgEl}
    <div class="pc-bd">
      <div class="pc-nm">${g.product_name}</div>
      <div class="price-row">
        <span class="pr-s">S/</span><span class="pr-n">${pN}</span><span class="pr-u">/${g.unit||"kg"}</span>
      </div>
      ${tieneDesc?`<div class="pc-sub" style="color:var(--g);font-weight:700;">👥 En grupo: S/${pG}/${g.unit||"kg"}</div>`:""}
    </div>
    <div class="pc-btns">
      <button class="btn-grupo" onclick="abrirSectores('${g.id}')">👥 Ver grupos</button>
      <button class="btn-carrito ${yaEnCarrito?'en-carrito':''}" onclick="event.stopPropagation();${yaEnCarrito?`quitarDelCarrito('${g.id}')`:`agregarAlCarritoDirecto('${g.id}')`}">
        ${yaEnCarrito?'✅ En carrito':'🛒 Agregar'}
      </button>
    </div>
  </div>`;
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────
function renderHist(){
  const el=document.getElementById("hist-body");
  if(!historial.length){ el.innerHTML=`<div class="empty"><span>📭</span>Aún no tienes pedidos</div>`; return; }
  el.innerHTML=historial.map((h,i)=>`<div class="hist-card">
    <div class="hist-em">${h.emoji}</div>
    <div class="hist-info">
      <div class="hist-nm">${h.product_name}</div>
      <div class="hist-meta">📍 ${h.sector} · ${h.fecha} · ${h.tipo_compra==="grupal"?"👥 Grupal":"🛒 Individual"}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
      <span class="hist-status hs-${h.payment_status==="verified"?"active":"pending"}">${h.payment_status==="verified"?"✅ Verificado":"⏳ Pendiente"}</span>
      ${h.payment_status!=="verified"?`<button onclick="eliminarPedido(${i})" style="background:none;border:none;font-size:11px;color:#ef4444;cursor:pointer;padding:2px;">🗑 Cancelar</button>`:""}
    </div>
  </div>`).join("");
}

window.eliminarPedido=function(i){
  if(!confirm("¿Cancelar este pedido?")) return;
  historial.splice(i,1);
  localStorage.setItem("gp_hist",JSON.stringify(historial));
  renderHist(); toast("🗑 Pedido cancelado");
};

// ── PERFIL ────────────────────────────────────────────────────────────────
function renderPerfil(){
  const el=document.getElementById("perfil-body");
  if(!usuarioActual){
    el.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;">
      <div style="font-size:52px;margin-bottom:10px;">👤</div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:900;margin-bottom:6px;">No has iniciado sesión</div>
      <div style="font-size:13px;color:var(--mut);margin-bottom:16px;">Inicia sesión para ver tu perfil.</div>
      <button class="btn-confirmar" onclick="goScreen('login')" style="max-width:200px;margin:0 auto;">Iniciar sesión →</button>
    </div>`;
    return;
  }
  const u=usuarioActual;
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;">
    <div style="background:linear-gradient(135deg,#14532d,#166634);border-radius:16px;padding:20px;color:#fff;display:flex;align-items:center;gap:14px;">
      <div style="width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:26px;">${u.nombre?u.nombre[0].toUpperCase():"👤"}</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:900;">${u.nombre}</div>
        <div style="font-size:12px;opacity:.8;margin-top:2px;">📱 ${u.telefono_completo||u.telefono||"—"}</div>
      </div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:900;margin-bottom:8px;">📦 Datos de entrega</div>
      <div style="font-size:13px;color:var(--mut);">📍 ${u.direccion||"No ingresada"}</div>
      <div style="font-size:13px;color:var(--mut);">🚪 ${u.referencia||"—"}</div>
      <div style="font-size:13px;color:var(--mut);">🕐 ${u.horario||"—"}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--g);">${historial.length}</div>
        <div style="font-size:11px;color:var(--mut);font-weight:600;">Pedidos totales</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--g);">${historial.filter(h=>h.payment_status==="verified").length}</div>
        <div style="font-size:11px;color:var(--mut);font-weight:600;">Verificados ✅</div>
      </div>
    </div>
    <button onclick="cerrarSesion()" style="width:100%;padding:13px;background:#fff;border:2px solid #fecaca;border-radius:12px;color:#dc2626;font-size:14px;font-weight:700;cursor:pointer;">🚪 Cerrar sesión</button>
  </div>`;
}
</script>
