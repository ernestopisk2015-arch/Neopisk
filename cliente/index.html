<script>

// Generate icon with emoji using canvas
function generateIcon(size, bgColor, emoji) {
  var canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  var r = size * 0.22;
  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = bgColor;
  ctx.fill();
  // Emoji centered
  ctx.font = (size * 0.55) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, size / 2, size / 2 + size * 0.03);
  return canvas.toDataURL('image/png');
}


(function() {
  // Generate icons with real emoji via canvas
  var icon192 = generateIcon(192, '#0d7a3e', '🍊');
  var icon512 = generateIcon(512, '#0d7a3e', '🍊');

  // Also set apple-touch-icon dynamically
  var appleLink = document.querySelector('link[rel="apple-touch-icon"]');
  if (appleLink) appleLink.href = icon192;

  var m = {
    name: "Neo Pisk Cliente",
    short_name: "Neo Pisk",
    start_url: "./",
    display: "standalone",
    orientation: "portrait",
    background_color: "#0d7a3e",
    theme_color: "#0d7a3e",
    icons: [
      { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  var blob = new Blob([JSON.stringify(m)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
})();
</script>

function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}
function buildNav(){const nav=document.getElementById('snav');nav.innerHTML='';NAVS.forEach(item=>{if(item.sec){nav.innerHTML+=`<div class="sb-sec">${item.sec}</div>`;}else{nav.innerHTML+=`<div class="sb-i" data-v="${item.id}" onclick="sv('${item.id}',this)"><span class="sb-ic">${item.ic}</span>${item.lb}</div>`;}});const first=NAVS.find(x=>x.id);if(first){sv(first.id,nav.querySelector(`[data-v="${first.id}"]`));}}
function sv(id,el){document.querySelectorAll('.sb-i').forEach(x=>x.classList.remove('on'));if(el)el.classList.add('on');document.getElementById('tbttl').textContent=TITLES[id]||id;const V={mpeds:vMpeds,track:vTrack,ahorro:vAhorro,tokens:vTokens};document.getElementById('pgc').innerHTML=V[id]?V[id]():'';closeSb();}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type==='err'?' err':'')+' on';clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),3500);}
function openModal(){document.getElementById('npModal').classList.add('on');}
function closeModal(){document.getElementById('npModal').classList.remove('on');}
function confirmarPedido(){closeModal();toast('✅ Pedido confirmado — llegará hoy 12–14h');setTimeout(()=>sv('track',null),1500);}
