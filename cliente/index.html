<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GruPay</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:20px;}
.ok{background:#16a34a;padding:12px;border-radius:8px;margin:8px 0;font-weight:700;}
.err{background:#dc2626;padding:12px;border-radius:8px;margin:8px 0;font-weight:700;}
.prod{background:#1e293b;padding:10px;border-radius:8px;margin:6px 0;display:flex;align-items:center;gap:10px;}
.prod img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
</style>
</head>
<body>
<h2>🛒 GruPay — Test</h2>
<div id="log"></div>
<div id="productos"></div>

<script type="module">
function log(msg, ok=true){
  const d=document.createElement('div');
  d.className=ok?'ok':'err';
  d.textContent=msg;
  document.getElementById('log').appendChild(d);
}

log('✅ JavaScript cargando...');

try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, collection, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  
  log('✅ Firebase importado');

  const db = getFirestore(initializeApp({
    apiKey:"AIzaSyBhnAKQfADIdNX4brbG-YdTEr-DKFta7jE",
    authDomain:"neopisk.firebaseapp.com", projectId:"neopisk",
    storageBucket:"neopisk.appspot.com", messagingSenderId:"873475816427",
    appId:"1:873475816427:web:fa8ca59cb85a2c1d00f7ae"
  }));

  log('✅ Firestore listo — escuchando productos...');

  onSnapshot(collection(db,"grupay_groups"), (snap) => {
    log(`✅ ${snap.size} productos recibidos!`);
    const el = document.getElementById('productos');
    el.innerHTML = '';
    snap.forEach(d => {
      const g = d.data();
      const div = document.createElement('div');
      div.className = 'prod';
      div.innerHTML = `
        ${g.image_url ? `<img src="${g.image_url}">` : `<span style="font-size:36px">${g.emoji||'📦'}</span>`}
        <div>
          <div style="font-weight:700">${g.product_name}</div>
          <div style="color:#86efac">S/${g.price_per_unit}/${g.unit||'kg'}</div>
          <div style="font-size:11px;color:#64748b">${g.image_url?'✅ tiene imagen':'❌ sin imagen'}</div>
        </div>`;
      el.appendChild(div);
    });
  }, (err) => {
    log('❌ Error: ' + err.message, false);
  });

} catch(e) {
  log('❌ Error JS: ' + e.message, false);
}
</script>
</body>
</html>
