<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GruPay">
<title>GruPay</title>
<link rel="manifest" href="/cliente/manifest.json">
<link rel="apple-touch-icon" href="" id="apple-icon">

<script>
(function(){
  var c=document.createElement('canvas');c.width=192;c.height=192;
  var x=c.getContext('2d'),r=42;
  x.beginPath();x.moveTo(r,0);x.lineTo(192-r,0);x.quadraticCurveTo(192,0,192,r);
  x.lineTo(192,192-r);x.quadraticCurveTo(192,192,192-r,192);
  x.lineTo(r,192);x.quadraticCurveTo(0,192,0,192-r);
  x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);x.closePath();
  x.fillStyle='#16a34a';x.fill();
  x.font='106px serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText('🛒',96,102);
  document.getElementById('apple-icon').href=c.toDataURL('image/png');
})();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js',{scope:'/cliente/'}).catch(function(e){console.warn('SW:',e);});
  });
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#16a34a;--gd:#15803d;--gl:#f0fdf4;--gb:#bbf7d0;
  --a:#d97706;--txt:#1e293b;--mut:#64748b;--bdr:#e2e8f0;--bg:#f4f6f9;
  --r:#dc2626;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;}
#shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg);}

/* HEADER */
.hdr{background:#fff;padding:11px 14px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:2px solid var(--bdr);flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.05);}
.logo{display:flex;align-items:center;gap:8px;}
.logo-ic{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--gd),var(--g));
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:900;letter-spacing:-1px;}
.logo-t b{color:var(--g);}

/* SCREEN SYSTEM */
.screen{display:none;flex:1;overflow-y:auto;padding:14px;}
.screen.active{display:flex;flex-direction:column;gap:12px;}

/* IFRAME SCREEN */
#screen-pago{display:none;flex:1;flex-direction:column;}
#screen-pago.active{display:flex;}
#pago-header{background:#fff;padding:10px 14px;display:flex;align-items:center;
  gap:10px;border-bottom:2px solid var(--bdr);flex-shrink:0;}
#pago-header button{background:var(--g);color:#fff;border:none;padding:8px 16px;
  border-radius:8px;font-weight:700;cursor:pointer;}
#pago-iframe{flex:1;border:none;width:100%;}

/* PRODUCTO CARD */
.prod-card{background:#fff;border-radius:16px;padding:14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;
  border:2px solid transparent;transition:border .2s;}
.prod-card:active{border-color:var(--g);}
.prod-emoji{font-size:36px;width:56px;height:56px;background:var(--gl);
  border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prod-info{flex:1;}
.prod-name{font-weight:700;font-size:15px;}
.prod-price{color:var(--g);font-weight:700;font-size:14px;margin-top:2px;}
.prod-progress{margin-top:6px;}
.prog-bar{height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g),#22c55e);border-radius:99px;transition:width .4s;}
.prog-txt{font-size:11px;color:var(--mut);margin-top:3px;}

/* SECTION TITLE */
.sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:var(--txt);}
.sec-sub{font-size:13px;color:var(--mut);margin-top:2px;}

/* DETALLE */
.det-hero{background:#fff;border-radius:16px;padding:20px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.det-emoji{font-size:64px;margin-bottom:8px;}
.det-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;}
.det-price{color:var(--g);font-weight:700;font-size:16px;margin-top:4px;}

.det-prog{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.det-prog-bar{height:12px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin:10px 0;}
.det-prog-fill{height:100%;background:linear-gradient(90deg,var(--g),#22c55e);border-radius:99px;transition:width .5s;}
.det-amounts{display:flex;justify-content:space-between;font-size:13px;}
.det-amounts b{color:var(--g);}

.det-miembros{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.miembro-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);}
.miembro-item:last-child{border-bottom:none;}
.miembro-av{width:36px;height:36px;border-radius:50%;background:var(--gl);
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.miembro-info{flex:1;}
.miembro-name{font-weight:600;font-size:14px;}
.miembro-dist{font-size:12px;color:var(--mut);}
.miembro-monto{font-weight:700;color:var(--g);}

/* FORM */
.form-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.form-label{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:2px solid var(--bdr);border-radius:10px;
  font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.form-input:focus{border-color:var(--g);}
select.form-input{background:#fff;}

.btn-green{width:100%;padding:14px;background:linear-gradient(135deg,var(--gd),var(--g));
  color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px;}
.btn-green:disabled{background:#9ca3af;cursor:not-allowed;}
.btn-back{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;}

/* BADGE */
.badge-activado{background:#dcfce7;color:#15803d;padding:6px 12px;border-radius:99px;
  font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.badge-open{background:#fef9c3;color:#854d0e;padding:6px 12px;border-radius:99px;
  font-size:12px;font-weight:700;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1e293b;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;
  font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* NAV */
.nav{background:#fff;border-top:2px solid var(--bdr);display:flex;flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;color:var(--mut);font-family:'DM Sans',sans-serif;font-weight:600;}
.nav-btn.active{color:var(--g);}
.nav-btn span:first-child{font-size:22px;}

/* MIS PEDIDOS */
.pedido-card{background:#fff;border-radius:14px;padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.pedido-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pedido-emoji{font-size:28px;}
.pedido-name{font-weight:700;font-size:15px;}
.pedido-dist{font-size:12px;color:var(--mut);}
.pedido-monto{font-weight:700;color:var(--g);font-size:16px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--mut);}
.spinner{width:36px;height:36px;border:3px solid var(--gb);border-top-color:var(--g);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.empty{text-align:center;color:var(--mut);padding:40px 20px;}
.empty-ic{font-size:48px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">
      <div class="logo-ic">🛒</div>
      <div>
        <div class="logo-t">Gru<b>Pay</b></div>
      </div>
    </div>
    <div id="hdr-right"></div>
  </div>

  <!-- SCREEN: LISTA PRODUCTOS -->
  <div class="screen active" id="screen-lista">
    <div>
      <div class="sec-title">Compra en grupo 🤝</div>
      <div class="sec-sub">Junta S/150 entre vecinos y activa el pedido</div>
    </div>
    <div id="productos-list">
      <div class="loading"><div class="spinner"></div><span>Cargando productos...</span></div>
    </div>
  </div>

  <!-- SCREEN: DETALLE PRODUCTO -->
  <div class="screen" id="screen-detalle">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn-back" onclick="goScreen('lista')">←</button>
      <div class="sec-title" id="det-title">Detalle</div>
    </div>
    <div class="det-hero">
      <div class="det-emoji" id="det-emoji"></div>
      <div class="det-name" id="det-name"></div>
      <div class="det-price" id="det-price"></div>
    </div>
    <div class="det-prog">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:700;font-size:14px;">Progreso del grupo</span>
        <span id="det-badge"></span>
      </div>
      <div class="det-prog-bar"><div class="det-prog-fill" id="det-fill" style="width:0%"></div></div>
      <div class="det-amounts">
        <span>Acumulado: <b id="det-actual">S/0</b></span>
        <span>Meta: <b>S/150</b></span>
      </div>
    </div>
    <div class="det-miembros" id="det-miembros-box">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px;">👥 Miembros del grupo</div>
      <div id="det-miembros-list"></div>
    </div>
    <div id="det-form-box"></div>
  </div>

  <!-- SCREEN: MIS PEDIDOS -->
  <div class="screen" id="screen-mios">
    <div class="sec-title">Mis pedidos 📦</div>
    <div id="mios-list">
      <div class="loading"><div class="spinner"></div><span>Cargando...</span></div>
    </div>
  </div>

  <!-- SCREEN: PAGO (iframe) -->
  <div id="screen-pago">
    <div id="pago-header">
      <button onclick="goScreen('lista')">← Volver</button>
      <span style="font-weight:700;">Pago seguro</span>
    </div>
    <iframe id="pago-iframe" src="" allow="payment"></iframe>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-lista" onclick="goScreen('lista')">
      <span>🛒</span><span>Productos</span>
    </button>
    <button class="nav-btn" id="nav-mios" onclick="goScreen('mios')">
      <span>📦</span><span>Mis pedidos</span>
    </button>
  </nav>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, increment, serverTimestamp, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBhnAKQfADIdNX4brbG-YdTEr-DKFta7jE",
  authDomain:"neopisk.firebaseapp.com",
  projectId:"neopisk",
  storageBucket:"neopisk.appspot.com",
  messagingSenderId:"873475816427",
  appId:"1:873475816427:web:fa8ca59cb85a2c1d00f7ae"
});
const db = getFirestore(app);

const ZONAS = ["San Borja","La Molina","Surco","Jesús María","San Isidro","Miraflores","Surquillo"];

// --- USER ID local ---
let UID = localStorage.getItem('grupay_uid');
if(!UID){ UID = 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); localStorage.setItem('grupay_uid',UID); }

let currentGrupo = null;
let gruposData = {};

// --- TOAST ---
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// --- SCREEN NAVIGATION ---
window.goScreen = function(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-pago').classList.remove('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(name==='pago'){
    document.getElementById('screen-pago').classList.add('active');
  } else {
    document.getElementById('screen-'+name).classList.add('active');
    const nb = document.getElementById('nav-'+name);
    if(nb) nb.classList.add('active');
  }
  if(name==='mios') cargarMios();
};

// --- CARGAR LISTA PRODUCTOS ---
onSnapshot(collection(db,'grupay_groups'), snap=>{
  gruposData={};
  snap.forEach(d=>{ gruposData[d.id]={id:d.id,...d.data()}; });
  renderLista();
});

function renderLista(){
  const el = document.getElementById('productos-list');
  const grupos = Object.values(gruposData);
  if(!grupos.length){ el.innerHTML='<div class="empty"><div class="empty-ic">🛒</div><p>Cargando productos...</p></div>'; return; }
  el.innerHTML = grupos.map(g=>{
    const pct = Math.min(100, Math.round((g.current_amount||0)/150*100));
    return `<div class="prod-card" onclick="abrirDetalle('${g.id}')">
      <div class="prod-emoji">${g.emoji}</div>
      <div class="prod-info">
        <div class="prod-name">${g.product_name}</div>
        <div class="prod-price">S/${g.price_per_unit} / ${g.unit}</div>
        <div class="prod-progress">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-txt">S/${g.current_amount||0} de S/150 acumulados · ${g.member_count||0} persona${g.member_count!==1?'s':''}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// --- ABRIR DETALLE ---
window.abrirDetalle = function(id){
  currentGrupo = gruposData[id];
  if(!currentGrupo) return;
  goScreen('detalle');
  renderDetalle(currentGrupo);

  // listener en tiempo real
  onSnapshot(doc(db,'grupay_groups',id), snap=>{
    if(!snap.exists()) return;
    currentGrupo = {id:snap.id,...snap.data()};
    gruposData[id] = currentGrupo;
    renderDetalle(currentGrupo);
  });

  // miembros
  onSnapshot(collection(db,'grupay_groups',id,'members'), snap=>{
    const miembros=[];
    snap.forEach(d=>miembros.push(d.data()));
    renderMiembros(miembros);
  });
};

function renderDetalle(g){
  document.getElementById('det-title').textContent = g.product_name;
  document.getElementById('det-emoji').textContent = g.emoji;
  document.getElementById('det-name').textContent = g.product_name;
  document.getElementById('det-price').textContent = `S/${g.price_per_unit} / ${g.unit} · mín S/50 por persona`;
  const actual = g.current_amount||0;
  const pct = Math.min(100, Math.round(actual/150*100));
  document.getElementById('det-fill').style.width = pct+'%';
  document.getElementById('det-actual').textContent = 'S/'+actual;
  const badge = document.getElementById('det-badge');
  if(g.status==='active'||actual>=150){
    badge.innerHTML='<span class="badge-activado">✅ ¡Activado!</span>';
    document.getElementById('det-form-box').innerHTML=`
      <button class="btn-green" onclick="irAPago()">💳 Ir a pagar</button>`;
  } else {
    badge.innerHTML='<span class="badge-open">⏳ Juntando grupo</span>';
    renderForm(g);
  }
}

function renderMiembros(miembros){
  const el = document.getElementById('det-miembros-list');
  if(!miembros.length){ el.innerHTML='<div style="color:var(--mut);font-size:13px;">Sé el primero en unirte 👋</div>'; return; }
  el.innerHTML = miembros.map(m=>`
    <div class="miembro-item">
      <div class="miembro-av">👤</div>
      <div class="miembro-info">
        <div class="miembro-name">${m.nombre}</div>
        <div class="miembro-dist">${m.distrito}</div>
      </div>
      <div class="miembro-monto">S/${m.monto}</div>
    </div>`).join('');
}

function renderForm(g){
  const box = document.getElementById('det-form-box');
  box.innerHTML=`
    <div class="form-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:12px;">🤝 Unirme al grupo</div>
      <label class="form-label">Tu nombre</label>
      <input class="form-input" id="f-nombre" placeholder="Ej: Juan Pérez" style="margin-bottom:10px;">
      <label class="form-label">Tu distrito</label>
      <select class="form-input" id="f-distrito" style="margin-bottom:10px;">
        <option value="">Selecciona tu distrito</option>
        ${ZONAS.map(z=>`<option>${z}</option>`).join('')}
      </select>
      <label class="form-label">¿Cuánto aportas? (mín S/50)</label>
      <input class="form-input" id="f-monto" type="number" min="50" placeholder="50" style="margin-bottom:14px;">
      <button class="btn-green" onclick="unirme('${g.id}')">Unirme al grupo →</button>
    </div>`;
}

// --- UNIRSE AL GRUPO ---
window.unirme = async function(grupoId){
  const nombre = document.getElementById('f-nombre').value.trim();
  const distrito = document.getElementById('f-distrito').value;
  const monto = parseInt(document.getElementById('f-monto').value);
  if(!nombre){ toast('⚠ Ingresa tu nombre'); return; }
  if(!distrito){ toast('⚠ Selecciona tu distrito'); return; }
  if(!monto||monto<50){ toast('⚠ Mínimo S/50'); return; }

  try{
    const grupoRef = doc(db,'grupay_groups',grupoId);
    await addDoc(collection(db,'grupay_groups',grupoId,'members'),{
      uid:UID, nombre, distrito, monto, joined_at: serverTimestamp()
    });
    await updateDoc(grupoRef,{
      current_amount: increment(monto),
      member_count: increment(1)
    });
    // guardar en local
    const mios = JSON.parse(localStorage.getItem('grupay_mios')||'[]');
    mios.push({grupoId, nombre, distrito, monto, producto:currentGrupo.product_name, emoji:currentGrupo.emoji, fecha:Date.now()});
    localStorage.setItem('grupay_mios', JSON.stringify(mios));
    toast('✅ ¡Te uniste al grupo!');
  }catch(e){
    toast('❌ Error: '+e.message);
  }
};

// --- IR A PAGO ---
window.irAPago = function(){
  document.getElementById('pago-iframe').src = 'https://neopisk.lat/invertir.html';
  goScreen('pago');
};

// --- MIS PEDIDOS ---
function cargarMios(){
  const mios = JSON.parse(localStorage.getItem('grupay_mios')||'[]');
  const el = document.getElementById('mios-list');
  if(!mios.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">📦</div><p>Aún no tienes pedidos</p></div>';
    return;
  }
  el.innerHTML = mios.reverse().map(m=>`
    <div class="pedido-card">
      <div class="pedido-top">
        <div class="pedido-emoji">${m.emoji}</div>
        <div style="flex:1">
          <div class="pedido-name">${m.producto}</div>
          <div class="pedido-dist">${m.distrito} · ${new Date(m.fecha).toLocaleDateString('es-PE')}</div>
        </div>
        <div class="pedido-monto">S/${m.monto}</div>
      </div>
    </div>`).join('');
}

</script>
</body>
</html>
